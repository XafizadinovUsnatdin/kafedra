  <rect x="13" y="20" width="4" height="9" fill="white" opacity="0.85"/>
  <rect x="19" y="20" width="4" height="9" fill="white" opacity="0.85"/>
  <rect x="25" y="20" width="4" height="9" fill="white" opacity="0.85"/>
  <rect x="31" y="20" width="4" height="9" fill="white" opacity="0.85"/>

