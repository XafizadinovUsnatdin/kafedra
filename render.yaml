services:
  - type: web
    name: kafedra-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python create_db.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
